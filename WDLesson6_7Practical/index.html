<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <title>WD_6.7 Practical</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
    <script src="script.js"></script>
   </head>

  <body onload="init()">
    <div id="banner" class="container center">
      <div style="text-align:center">
          <h1>NYC Open Data</h1>
          <h2>Motor Vehicle Collision</h2>
      </div>
    </div>

    <div class="container subbanner">
      <div>
        <a class="button" href="https://opendata.cityofnewyork.us/" target="_blank">NYC Open Data</a> 
        <a class="button" target="_blank" href="https://data.cityofnewyork.us/Public-Safety/Motor-Vehicle-Collisions-Crashes/h9gi-nx95/about_data"
"> Motor-Vehicle-Collisions-Crashes</a>
        <a class="button" target="_blank" href="https://jsoneditoronline.org/"> JSON Editor Online</a>
       </div>
    </div>

    <div class="container">
      <div id="leftPanel">
        <!--Card below is the basic HTML to use for Challenge 1 and 3 -->
        <div class="card">
          <h3>SEARCH By Crash</h3>
          <input type="text" id="crashFactor" placeholder="Enter Crash (ALL CAPS)">
          <input type="text" id="crashType" placeholder="Enter Crash Type">
          <hr>
          <a class="button" onclick="filterByCrash()"> Search</a>
        </div>
        <!--Challenge 1: Create another UI in order to filter by zip code. [See Challenge 2 in script.js] -->
        <div class="card">
          <h3>Search By Zip Code</h3>
          <input type="text" id="zip" placeholder="Enter Zip Code">
          <hr>
          <a class="button" onclick="filterByZip()">Search</a>
        </div>
        <!--Challenge 3: Create another UI in order to filter by Crash type. [See Challenge 4 in script.js] -->
        <div class="card">
          <h3>Search By Crash type</h3>
          <input type="text" id="crash" placeholder="Enter Crash Code">
          <hr>
          <a class="button" onclick="filterByCrash()">Search</a>
        </div>
      </div>

      <div class="card" id="rightPanel">
        <h1>MVC Service Requests</h1>
        <div id="result" class="container"></div>
        <div id="output" class="container"></div>
      </div>
      
    </div>

    <div id="footer" class="container center">
      <h3>Lesson 6.7 Practical. The end of Cards</h3>
    </div>  
  </body>
</html>
